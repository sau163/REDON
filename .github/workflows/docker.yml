# Build the Docker image and publish it to GitHub Container Registry (GHCR).
# Pushes :latest on every commit to main, and a version tag on each release,
# so anyone can run the project with:  docker run ghcr.io/sau163/redon
name: docker

on:
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

permissions:
  contents: read
  packages: write      # required to push to GHCR using the built-in token

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # lowercase image name (GHCR requires it); links to this repo via labels
          images: ghcr.io/sau163/redon
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
